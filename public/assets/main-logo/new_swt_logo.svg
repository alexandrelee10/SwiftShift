<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" fill="none">
  <!-- Transparent background -->
  <g transform="translate(80,110)">
    <!-- Blue letter blocks -->
    <rect x="0" y="40" width="190" height="190" fill="#1E63F0"/>
    <rect x="215" y="40" width="190" height="190" fill="#1E63F0"/>
    <rect x="430" y="40" width="190" height="190" fill="#1E63F0"/>

    <!-- Letters -->
    <text x="95" y="170" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="120" font-weight="700" fill="white">S</text>
    <text x="310" y="170" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="120" font-weight="700" fill="white">W</text>
    <text x="525" y="170" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="120" font-weight="700" fill="white">T</text>

    <!-- TM -->
    <text x="640" y="68"
          font-family="Arial, Helvetica, sans-serif"
          font-size="30" font-weight="700" fill="#1E63F0">TM</text>

    <!-- Wordmark -->
    <text x="675" y="178"
          font-family="Arial, Helvetica, sans-serif"
          font-size="112" font-style="italic" font-weight="700" fill="white">SwiftShift</text>
  </g>
</svg>
